<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Matrix Editor</title>
  <style>
    :root {
      --c0: #f8fafc;
      --c1: #d1d5db; /* light gray for value 1 */
      --c2: #4b5563; /* dark gray for value 2 */
      --grid-size: 28px;
    }
    body { font-family: Arial, sans-serif; margin: 1rem; background: #f6f8fb; color: #111; }
    h1 { margin-bottom: 0.25rem; }
    .bar { display: flex; gap: 1rem; align-items: center; margin-bottom: 0.75rem; flex-wrap: wrap; }
    .grid-wrap { display: flex; gap: 8px; align-items: flex-start; margin-top: 0.5rem; }
    #rowLabels { display: grid; gap: 4px; grid-auto-rows: var(--grid-size); }
    #grid { display: grid; gap: 4px; grid-auto-rows: var(--grid-size); }
    .row-label { width: 38px; height: var(--grid-size); display: grid; place-items: center; font-weight: 600; color: #475569; border-radius: 4px; background: #e2e8f0; border: 1px solid #cbd5e1; cursor: pointer; user-select: none; }
    .cell { width: var(--grid-size); height: var(--grid-size); border-radius: 4px; border: 1px solid #cbd5e1; cursor: pointer; display: grid; place-items: center; font-weight: 600; color: #0f172a; user-select: none; }
    .v0 { background: var(--c0); color: #0f172a; }
    .v1 { background: var(--c1); color: #111; }
    .v2 { background: var(--c2); color: #fff; }
    #log { background: #fff; border: 1px solid #d0d7de; padding: 0.5rem; min-height: 140px; max-height: 220px; overflow-y: auto; white-space: pre-wrap; }
    button { padding: 0.45rem 0.8rem; cursor: pointer; }
    select, button { font-size: 0.95rem; }
    .pill { padding: 0.25rem 0.6rem; border-radius: 999px; background: #e2e8f0; font-size: 0.85rem; }
  </style>
</head>
<body>
  <h1>Matrix Editor</h1>
  <div class="bar">
    <div>Width:
      <select id="width">
        <option value="8">8</option>
        <option value="9">9</option>
        <option value="10">10</option>
        <option value="11">11</option>
        <option value="12">12</option>
        <option value="13">13</option>
        <option value="14">14</option>
        <option value="15">15</option>
        <option value="16" selected>16</option>
      </select>
    </div>
    <div class="pill">Height: 16</div>
    <div class="pill" id="cells">Cells: 256</div>
    <div>Status: <span id="status">connecting...</span></div>
    <button id="load">Load device matrix</button>
    <button id="clear">Clear</button>
    <button id="send">Send matrix</button>
  </div>
  <div class="bar" style="margin-top: 0.25rem; gap: 0.5rem;">
    <label>Bar width: <input id="barWidth" type="number" min="16" step="16" value="48" style="width:6rem" /></label>
    <label>Bar height: <input id="barHeight" type="number" min="50" step="10" value="250" style="width:6rem" /></label>
    <span class="pill">Bars: 16 (fixed)</span>
  </div>
  <div class="grid-wrap">
    <div id="rowLabels"></div>
    <div id="grid"></div>
  </div>
  <div style="margin-top: 0.75rem; padding: 0.6rem; border: 1px solid #d0d7de; background: #fff; border-radius: 6px; max-width: 420px;">
    <strong>Legend:</strong> 2 = lighten, 1 = darken, 0 = no action
  </div>
  <h3>Log</h3>
  <div id="log"></div>

  <script>
    const HEIGHT = 16;
    const widthSelect = document.getElementById('width');
    const gridEl = document.getElementById('grid');
    const rowLabelsEl = document.getElementById('rowLabels');
    const statusEl = document.getElementById('status');
    const logEl = document.getElementById('log');
    const cellsEl = document.getElementById('cells');
    const clearBtn = document.getElementById('clear');
    const loadBtn = document.getElementById('load');
    const sendBtn = document.getElementById('send');
    const barWidthInput = document.getElementById('barWidth');
    const barHeightInput = document.getElementById('barHeight');

    let W = parseInt(widthSelect.value, 10);
    let matrix = Array.from({ length: HEIGHT }, () => Array(W).fill(0));

    const log = (m) => {
      const atBottom = logEl.scrollHeight - logEl.scrollTop <= logEl.clientHeight + 10;
      logEl.textContent += m + '\n';
      if (atBottom) logEl.scrollTop = logEl.scrollHeight;
    };

    const setStatus = (s) => { statusEl.textContent = s; };

    const ensureWidthOption = (w) => {
      if (!widthSelect.querySelector(`option[value="${w}"]`)) {
        const opt = document.createElement('option');
        opt.value = String(w);
        opt.textContent = String(w);
        widthSelect.appendChild(opt);
      }
    };

    const cycleValue = (v) => (v + 1) % 3;
    const decValue = (v) => (v + 2) % 3; // equivalent to (v-1+3)%3 without needing negative

    const renderGrid = () => {
      gridEl.innerHTML = '';
      rowLabelsEl.innerHTML = '';

      gridEl.style.gridTemplateColumns = `repeat(${W}, var(--grid-size))`;
      rowLabelsEl.style.gridTemplateRows = `repeat(${HEIGHT}, var(--grid-size))`;
      matrix.forEach((row, y) => {
        const label = document.createElement('div');
        label.className = 'row-label';
        label.textContent = y;
        label.onclick = () => {
          const current = matrix[y][0];
          const next = cycleValue(current);
          for (let x = 0; x < W; x++) {
            matrix[y][x] = next;
          }
          renderGrid();
        };
        label.oncontextmenu = (e) => {
          e.preventDefault();
          const current = matrix[y][0];
          const next = decValue(current);
          for (let x = 0; x < W; x++) {
            matrix[y][x] = next;
          }
          renderGrid();
          return false;
        };
        rowLabelsEl.appendChild(label);

        row.forEach((val, x) => {
          const cell = document.createElement('div');
          cell.className = `cell v${val}`;
          cell.textContent = val;
          cell.onclick = () => {
            matrix[y][x] = cycleValue(matrix[y][x]);
            cell.className = `cell v${matrix[y][x]}`;
            cell.textContent = matrix[y][x];
          };
          cell.oncontextmenu = (e) => {
            e.preventDefault();
            matrix[y][x] = decValue(matrix[y][x]);
            cell.className = `cell v${matrix[y][x]}`;
            cell.textContent = matrix[y][x];
            return false;
          };
          gridEl.appendChild(cell);
        });
      });
      cellsEl.textContent = `Cells: ${HEIGHT * W}`;
    };

    widthSelect.onchange = () => {
      W = parseInt(widthSelect.value, 10);
      matrix = Array.from({ length: HEIGHT }, () => Array(W).fill(0));
      renderGrid();
    };

    clearBtn.onclick = () => {
      matrix = Array.from({ length: HEIGHT }, () => Array(W).fill(0));
      renderGrid();
    };

    const flatten = () => {
      const out = [];
      for (let y = 0; y < HEIGHT; y++) {
        for (let x = 0; x < W; x++) {
          out.push(matrix[y][x]);
        }
      }
      return out;
    };

    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    const ws = new WebSocket(`${proto}://${location.host}/ws`);

    ws.onopen = () => { setStatus('connected'); log('WS open'); };
    ws.onclose = () => { setStatus('closed'); log('WS closed'); };
    ws.onerror = (e) => { setStatus('error'); log('WS error'); console.error(e); };
    ws.onmessage = (ev) => {
      try {
        const msg = JSON.parse(ev.data);
        if (msg && msg.type === 'matrix' && Array.isArray(msg.data)) {
          const newW = msg.width || W;
          const newH = msg.height || HEIGHT;
          const newBarW = msg.bar_width || Number(barWidthInput.value) || 50;
          const newBarH = msg.bar_height || Number(barHeightInput.value) || 250;
          // assume height is 16; truncate if mismatch
          W = newW;
          ensureWidthOption(W);
          widthSelect.value = String(W);
          barWidthInput.value = String(newBarW);
          barHeightInput.value = String(newBarH);
          matrix = Array.from({ length: HEIGHT }, () => Array(W).fill(0));
          const maxY = Math.min(HEIGHT, newH);
          const maxX = W;
          for (let y = 0; y < maxY; y++) {
            for (let x = 0; x < maxX; x++) {
              const idx = y * newW + x;
              if (idx < msg.data.length) {
                const v = Number(msg.data[idx]);
                matrix[y][x] = Number.isFinite(v) ? Math.max(0, Math.min(2, v)) : 0;
              }
            }
          }
          renderGrid();
          log(`Loaded matrix ${newW}x${newH} from device`);
          return;
        }
      } catch (err) {
        // fall through to log raw
      }
      log(`RX: ${ev.data}`);
    };

    loadBtn.onclick = () => {
      if (ws.readyState !== WebSocket.OPEN) {
        log('WS not open');
        return;
      }
      ws.send(JSON.stringify({ type: 'get_matrix' }));
      log('Requested matrix from device');
    };

    sendBtn.onclick = () => {
      if (ws.readyState !== WebSocket.OPEN) {
        log('WS not open');
        return;
      }
      const payload = {
        type: 'matrix',
        width: W,
        height: HEIGHT,
        bar_width: Number(barWidthInput.value) || 48,
        bar_height: Number(barHeightInput.value) || 250,
        data: flatten(), // row-major
      };
      ws.send(JSON.stringify(payload));
      log(`Sent matrix ${W}x${HEIGHT} (${payload.data.length} values)`);
    };

    renderGrid();
  </script>
</body>
</html>
